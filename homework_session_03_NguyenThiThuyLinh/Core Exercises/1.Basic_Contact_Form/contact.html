<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Contact Form</title>
    <style>
        /* Tạo nền Gradient chuyển động */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            font-family: 'Poppins', sans-serif;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Hiệu ứng kính mờ (Glassmorphism) cho Form */
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group { position: relative; margin-bottom: 25px; }

        label {
            font-size: 14px;
            font-weight: bold;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            background: #f9f9f9;
        }

        /* Hiệu ứng khi click vào ô nhập */
        input:focus, textarea:focus {
            border-color: #e73c7e;
            background: #fff;
            box-shadow: 0 0 10px rgba(231, 60, 126, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #e73c7e, #ee7752);
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        /* Hiệu ứng nhấn nút */
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(231, 60, 126, 0.4);
        }

        button:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <h2>Say Hello!</h2>
        <form action="submit.php" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="Nhập họ tên..." required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@vi-du.com" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" placeholder="Số điện thoại...">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="3" placeholder="Bạn cần giúp gì?"></textarea>
            </div>
            <button type="submit">Gửi tin nhắn ngay</button>
        </form>
    </div>
</body>
</html>
